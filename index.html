<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Romiee 🐾</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Optional nicer font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at top, #2a0a3d, #0d0614 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 30px;
      padding: 35px;
      width: 90%;
      max-width: 750px;

      background: rgba(30, 10, 50, 0.6);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(155, 89, 182, 0.2);

      box-shadow:
        0 0 40px rgba(155, 89, 182, 0.25),
        0 10px 40px rgba(0,0,0,0.6);
    }

    .avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #9b59b6;
      box-shadow: 0 0 25px rgba(155, 89, 182, 0.6);
    }

    .content {
      flex: 1;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #c084fc, #9b59b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      opacity: 0.75;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .links a {
      text-decoration: none;
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 14px;
      background: linear-gradient(135deg, #6d28d9, #9b59b6);
      box-shadow: 0 0 15px rgba(155, 89, 182, 0.4);
      transition: all 0.2s ease;
    }

    .links a:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 0 25px rgba(155, 89, 182, 0.7);
    }

    .links a:active {
      transform: scale(0.98);
    }

    @media (max-width: 650px) {
      .card {
        flex-direction: column;
        text-align: center;
      }

      .avatar {
        margin-bottom: 10px;
      }

      .links {
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <img class="avatar" src="art.webp">

    <div class="content">
      <h1>Romiee 🐾</h1>
      <p>
        Hey, I’m Romiee. Welcome to my site!  
        I make stuff, play games, and exist as a silly puppyyy :3
      </p>
      
      </div>
    </div>
  </div>

</body>
</html>
