<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Romiee</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #5f2c82, #9b59b6);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1e1e2f;
      color: white;
      display: flex;
      align-items: center;
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 700px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .avatar {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 30px;
      border: 4px solid #9b59b6;
    }

    .content h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .content p {
      opacity: 0.8;
      line-height: 1.5;
      margin-bottom: 15px;
    }

    .links a {
      text-decoration: none;
      color: white;
      background: #9b59b6;
      padding: 8px 14px;
      border-radius: 8px;
      margin-right: 10px;
      transition: 0.2s;
      font-size: 14px;
    }

    .links a:hover {
      background: #b97ddb;
    }

    @media (max-width: 600px) {
      .card {
        flex-direction: column;
        text-align: center;
      }

      .avatar {
        margin: 0 0 20px 0;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <img class="avatar" src="https://via.placeholder.com/300" alt="Profile Picture">

    <div class="content">
      <h1>Romiee</h1>
      <p>
        Hey, I’m Romiee. This is my personal site.  
        I’m into whatever you want to put here — gaming, coding, music, anything.
      </p>

      <div class="links">
        <a href="#">Twitter</a>
        <a href="#">GitHub</a>
        <a href="#">Discord</a>
      </div>
    </div>
  </div>

</body>
</html>
